syntax = "proto3";

package article;

import "google/api/annotations.proto";

option go_package = "demo2kratos/api/article;article";

service ArticleService {
  rpc CreateArticle(CreateArticleRequest) returns (CreateArticleReply) {
    option (google.api.http) = {
      post: "/articles"
      body: "*"
    };
  }

  rpc UpdateArticle(UpdateArticleRequest) returns (UpdateArticleReply) {
    option (google.api.http) = {
      put: "/articles/{id}"
      body: "*"
    };
  }

  rpc DeleteArticle(DeleteArticleRequest) returns (DeleteArticleReply) {
    option (google.api.http) = {
      delete: "/articles/{id}"
    };
  }

  rpc GetArticle(GetArticleRequest) returns (GetArticleReply) {
    option (google.api.http) = {
      get: "/articles/{id}"
    };
  }

  rpc ListArticles(ListArticlesRequest) returns (ListArticlesReply) {
    option (google.api.http) = {
      get: "/articles"
    };
  }

  rpc ListStudentArticles(ListStudentArticlesRequest) returns (ListArticlesReply) {
    option (google.api.http) = {
      get: "/students/{student_id}/articles"
    };
  }
}

message ArticleInfo {
  int64 id = 1;
  string title = 2;
  string content = 3;
  int64 student_id = 4;
}

message CreateArticleRequest {
  string title = 1;
  string content = 2;
  int64 student_id = 3;
}

message CreateArticleReply {
  ArticleInfo article = 1;
}

message UpdateArticleRequest {
  int64 id = 1;
  string title = 2;
  string content = 3;
  int64 student_id = 4;
}

message UpdateArticleReply {
  ArticleInfo article = 1;
}

message DeleteArticleRequest {
  int64 id = 1;
}

message DeleteArticleReply {
  bool success = 1;
}

message GetArticleRequest {
  int64 id = 1;
}

message GetArticleReply {
  ArticleInfo article = 1;
}

message ListArticlesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListStudentArticlesRequest {
  int64 student_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListArticlesReply {
  repeated ArticleInfo articles = 1;
  int32 count = 2;
}
